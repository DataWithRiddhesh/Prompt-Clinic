kind = "web"
previewPath = "/"
title = "ClinicSaathi"
version = "1.0.0"
id = "artifacts/clinic-saathi"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20471

[services.development]
run = "pnpm --filter @workspace/clinic-saathi run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clinic-saathi", "run", "build" ]
publicDir = "artifacts/clinic-saathi/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20471"
BASE_PATH = "/"
